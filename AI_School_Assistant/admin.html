<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; }
    .app { max-width: 680px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
    .card { background: white; border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; }
    .user-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 1.25rem; border-bottom: 1px solid #f0f0f0; }
    .user-row:last-child { border-bottom: none; }
    .user-info { display: flex; flex-direction: column; gap: 3px; }
    .user-name { font-size: 14px; font-weight: 500; }
    .user-email { font-size: 12px; color: #777; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
    .badge-worker { background: #dbeafe; color: #1e40af; }
    .badge-guest { background: #f3f4f6; color: #555; }
    .badge-admin { background: #fef3c7; color: #92400e; }
    .actions { display: flex; align-items: center; gap: 8px; }
    button { cursor: pointer; font-family: inherit; border-radius: 8px; border: 1px solid #ccc; background: white; padding: 5px 12px; font-size: 12px; }
    button.promote { border-color: #1e40af; color: #1e40af; }
    button.demote { border-color: #dc2626; color: #dc2626; }
    button:hover { opacity: 0.75; }
    .login-box { background: white; border: 1px solid #e5e5e5; border-radius: 14px; padding: 2rem; max-width: 380px; margin: 4rem auto; }
    .login-box h1 { margin-bottom: 1.25rem; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
    .field label { font-size: 12px; color: #777; }
    .field input { border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; }
    .btn-primary { width: 100%; background: #1a1a1a; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .error { font-size: 12px; color: #dc2626; margin-bottom: 8px; display: none; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .tag { font-size: 12px; color: #777; }
  </style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <h1>Admin login</h1>
    <div class="error" id="login-err">Invalid credentials or not an admin.</div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input type="password" id="pass" placeholder="••••••••"></div>
    <button class="btn-primary" onclick="doLogin()">Log in</button>
  </div>
</div>

<div id="admin-screen" style="display:none">
  <div class="app">
    <div class="topbar">
      <h1>Admin panel</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="tag" id="admin-name"></span>
        <button onclick="logout()">Log out</button>
      </div>
    </div>
    <div class="card" id="users-list"></div>
  </div>
</div>

<script>
  const API = "http://localhost:3000";
  let token = null;

  async function doLogin() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    const err = document.getElementById("login-err");
    const res = await fetch(API + "/auth/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!res.ok || data.user.role !== "admin") { err.style.display = "block"; return; }
    token = data.token;
    document.getElementById("admin-name").textContent = data.user.name;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("admin-screen").style.display = "block";
    loadUsers();
  }

  async function loadUsers() {
    const res = await fetch(API + "/admin/users", { headers: { Authorization: "Bearer " + token } });
    const users = await res.json();
    const list = document.getElementById("users-list");
    list.innerHTML = users.map(u => `
      <div class="user-row" id="user-${u.id}">
        <div class="user-info">
          <span class="user-name">${u.name}</span>
          <span class="user-email">${u.email}</span>
        </div>
        <div class="actions">
          <span class="badge badge-${u.role}">${u.role}</span>
          ${u.role === "admin" ? "" : u.role === "worker"
            ? `<button class="demote" onclick="setRole(${u.id}, 'guest')">Remove worker</button>`
            : `<button class="promote" onclick="setRole(${u.id}, 'worker')">Make worker</button>`
          }
        </div>
      </div>
    `).join("");
  }

  async function setRole(id, role) {
    await fetch(API + "/admin/users/" + id + "/role", {
      method: "PATCH", headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify({ role })
    });
    loadUsers();
  }

  function logout() {
    token = null;
    document.getElementById("login-screen").style.display = "block";
    document.getElementById("admin-screen").style.display = "none";
  }
</script>
</body>
</html>
