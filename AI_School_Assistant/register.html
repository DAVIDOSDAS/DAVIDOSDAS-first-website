<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border: 1px solid #e5e5e5; border-radius: 14px; padding: 2rem; width: 90%; max-width: 400px; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
    .field label { font-size: 12px; color: #777; }
    .field input { border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; }
    .field input:focus { outline: none; border-color: #1a1a1a; }
    button { width: 100%; cursor: pointer; font-family: inherit; border-radius: 8px; border: none; background: #1a1a1a; color: white; padding: 10px; font-size: 14px; margin-top: 4px; }
    button:hover { opacity: 0.85; }
    .error { font-size: 12px; color: #dc2626; margin-bottom: 8px; display: none; }
    .success { font-size: 13px; color: #166534; background: #dcfce7; border-radius: 8px; padding: 10px; margin-bottom: 12px; display: none; }
    .login-link { text-align: center; margin-top: 1rem; font-size: 13px; color: #777; }
    .login-link a { color: #1a1a1a; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
<div class="card">
  <h1>Create account</h1>
  <div class="success" id="success">Account created! You can now log in.</div>
  <div class="error" id="error"></div>
  <div class="field"><label>Full name</label><input type="text" id="name" placeholder="John Doe"></div>
  <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@example.com"></div>
  <div class="field"><label>Password</label><input type="password" id="pass" placeholder="••••••••"></div>
  <div class="field"><label>Confirm password</label><input type="password" id="pass2" placeholder="••••••••"></div>
  <button onclick="doRegister()">Create account</button>
  <div class="login-link">Already have an account? <a href="board.html">Log in</a></div>
</div>
<script>
  async function doRegister() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value;
    const pass2 = document.getElementById("pass2").value;
    const err = document.getElementById("error");
    const success = document.getElementById("success");
    err.style.display = "none";
    success.style.display = "none";
    if (!name || !email || !pass) { err.textContent = "All fields are required."; err.style.display = "block"; return; }
    if (pass !== pass2) { err.textContent = "Passwords do not match."; err.style.display = "block"; return; }
    if (pass.length < 6) { err.textContent = "Password must be at least 6 characters."; err.style.display = "block"; return; }
    const res = await fetch("http://localhost:3000/auth/register", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password: pass })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || "Something went wrong."; err.style.display = "block"; return; }
    success.style.display = "block";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("pass").value = "";
    document.getElementById("pass2").value = "";
  }
</script>
</body>
</html>
